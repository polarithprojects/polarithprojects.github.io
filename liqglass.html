<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Liquid Glass Tab Toggle</title>
    <style>
        /* Core page styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            /* Complex liquid gradient background with flowing shapes */
            background: linear-gradient(135deg, #090e36 0%, #151d6d 30%, #4a148c 70%, #090e36 100%);
        }

        /* Abstract, flowing "liquid" background patterns inspired by images */
        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        .background-pattern::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 30%, #5d0cf0, transparent 40%),
                        radial-gradient(circle at 20% 70%, #1a237e, transparent 50%),
                        radial-gradient(circle at 80% 80%, #151d6d, transparent 30%);
            filter: blur(120px);
            opacity: 0.5;
            animation: moveGradient 40s linear infinite alternate;
        }

        @keyframes moveGradient {
            0% { transform: translate(-5%, -5%); }
            100% { transform: translate(5%, 5%); }
        }

        /* Main container for the glass UI */
        .glass-ui-frame {
            position: relative;
            z-index: 10;
        }

        /* The frosted glass container (Glassmorphism effect) */
        .glass-background {
            position: relative;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); /* Crucial blur effect */
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
        }

        /* The central liquid selector "blob" that moves */
        .active-selector-blob {
            position: absolute;
            top: 10px;
            left: 10px;
            height: calc(100% - 20px);
            /* Initial shape is highly rounded and symmetrical */
            width: 140px; /* Adjust based on tab width and text */
            background: rgba(255, 255, 255, 0.15);
            border-radius: 70px; /* High radius for "liquid" look */
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.68, -0.6, 0.32, 1.6), /* Bouncy transition */
                        width 0.4s ease, 
                        border-radius 0.6s ease;
            filter: blur(1px); /* Soft focus for liquid feel */
        }

        /* When active-selector is at "Inbox" */
        .active-inbox .active-selector-blob {
            transform: translateX(100%); /* Moves to the other half */
            /* Changes to a more asymmetrical "liquid" shape during motion and rest */
            border-radius: 70px 20px 20px 70px;
        }

        /* Indidivudal Tab buttons */
        .tab-toggle {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .tab-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px 25px;
            background: none;
            border: none;
            cursor: pointer;
            width: 50%; /* Each tab takes half the width */
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* Icon styling */
        .tab-icon {
            width: 28px;
            height: 28px;
            fill: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }

        /* Text styling */
        .tab-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        /* Active states for tabs */
        .tab-button.active .tab-icon {
            fill: rgba(255, 255, 255, 1);
        }

        .tab-button.active .tab-text {
            color: rgba(255, 255, 255, 1);
        }

        /* Hover effect */
        .tab-button:not(.active):hover {
            opacity: 0.8;
        }

        /* Fine-tuning for the complex 'liquid' feel when moving */
        .active-inbox .active-selector-blob {
            width: 155px; /* Adjust based on text length difference */
        }

        /* Subtle inner highlight to enhance depth */
        .glass-background::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 10px;
            right: 10px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.02) 100%);
            border-radius: 2px;
        }

    </style>
</head>
<body>

<div class="background-pattern"></div>

<div class="glass-ui-frame">
    <div class="glass-background" id="mainContainer">
        
        <div class="active-selector-blob" id="blob"></div>
        
        <div class="tab-toggle">
            <button class="tab-button active" id="commandTab" data-tab="command">
                <svg class="tab-icon" viewBox="0 0 24 24" fill-rule="evenodd" clip-rule="evenodd">
                    <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 1c4.97 0 9 4.03 9 9s-4.03 9-9 9-9-4.03-9-9 4.03-9 9-9zm.5 4a3.5 3.5 0 0 0-3.5 3.5 3.5 3.5 0 0 0 3.5 3.5 3.5 3.5 0 0 0 3.5-3.5 3.5 3.5 0 0 0-3.5-3.5zm0 1a2.5 2.5 0 0 1 2.5 2.5 2.5 2.5 0 0 1-2.5 2.5 2.5 2.5 0 0 1-2.5-2.5 2.5 2.5 0 0 1 2.5-2.5z"/>
                </svg>
                <span class="tab-text">Command</span>
            </button>
            
            <button class="tab-button" id="inboxTab" data-tab="inbox">
                <svg class="tab-icon" viewBox="0 0 24 24">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 13.5l-2 1h-1l.71-.71c.1-.1.21-.21.32-.32.06-.06.12-.11.18-.17s.11-.11.16-.17.1-.11.15-.17l1.41 1.41-.77-2.31c.31.06.63.1.96.1s.65-.04.96-.1l-.77 2.31 1.41-1.41s.09.1.15.17l.16.17c.06.06.12.11.18.17.11.11.22.22.32.32l.71.71h-1l-2-1zm6-1h-2.18c-.41 1.16-1.51 2-2.82 2s-2.41-.84-2.82-2H5V5h14v10.5z"/>
                </svg>
                <span class="tab-text">Inbox</span>
            </button>
        </div>
    </div>
</div>

<script>
    const mainContainer = document.getElementById('mainContainer');
    const blob = document.getElementById('blob');
    const commandTab = document.getElementById('commandTab');
    const inboxTab = document.getElementById('inboxTab');

    function setActiveTab(tabId) {
        // Toggle active classes for text/icon colors
        if (tabId === 'command') {
            commandTab.classList.add('active');
            inboxTab.classList.remove('active');
            mainContainer.classList.remove('active-inbox'); // Use a container class for overall state
            blob.style.left = "10px"; // Specific control of position
            blob.style.width = "140px"; // Adjust width for text length
            blob.style.borderRadius = "70px"; // Original shape
        } else if (tabId === 'inbox') {
            inboxTab.classList.add('active');
            commandTab.classList.remove('active');
            mainContainer.classList.add('active-inbox');
            // The translateX logic is handled by CSS .active-inbox
            blob.style.width = "155px"; // Adjust width for text length
            // Border-radius is handled by CSS .active-inbox
        }
    }

    commandTab.addEventListener('click', () => {
        if (!commandTab.classList.contains('active')) {
            setActiveTab('command');
        }
    });

    inboxTab.addEventListener('click', () => {
        if (!inboxTab.classList.contains('active')) {
            setActiveTab('inbox');
        }
    });
</script>

</body>
</html>
