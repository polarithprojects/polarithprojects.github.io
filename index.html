<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polarith Web</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #0a0f1c;
}

/* 🔥 Animated Background Gradient */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #00f5ff, #ff00c8, #00ff88, #0066ff);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
    z-index: -3;
    filter: blur(120px);
    opacity: 0.4;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🔥 Floating blobs */
.blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    z-index: -2;
    animation: float 20s infinite alternate ease-in-out;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #ff00c8;
    top: 10%;
    left: 5%;
}

.blob2 {
    width: 250px;
    height: 250px;
    background: #00f5ff;
    bottom: 10%;
    right: 5%;
}

@keyframes float {
    from { transform: translateY(0px) translateX(0px); }
    to { transform: translateY(60px) translateX(40px); }
}

/* 🔥 Animated Gradient Text */
h1 {
    margin-top: 50px;
    font-size: 3rem;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #00f5ff, #ff00c8, #00ff88, #00f5ff);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: textFlow 6s linear infinite;
}

@keyframes textFlow {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
}

/* Container */
.container {
    width: 90%;
    max-width: 1200px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    margin: 60px 0;
}

/* Glass Cards */
.card {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.4s;
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    animation: fadeUp 0.8s ease forwards;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    background: rgba(255,255,255,0.15);
}

.card h3 {
    margin-bottom: 10px;
}

.card a {
    text-decoration: none;
    color: #00ffd5;
    font-size: 0.9rem;
}

/* Loader */
.loader {
    margin-top: 40px;
    opacity: 0.7;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<h1>Polarith Web</h1>

<div class="loader" id="loader">Loading Projects...</div>

<div class="container" id="projects"></div>

<script>
const username = "polarithprojects";
const repo = "polarithprojects.github.io";

async function loadProjects() {
    try {
        const res = await fetch(`https://api.github.com/repos/${username}/${repo}/issues`);
        const data = await res.json();

        const container = document.getElementById("projects");
        const loader = document.getElementById("loader");
        loader.style.display = "none";

        data.forEach((issue, index) => {
            if (issue.pull_request) return;

            const title = issue.title;
            const link = issue.body.trim();

            const card = document.createElement("div");
            card.className = "card";
            card.style.animationDelay = `${index * 0.1}s`;

            card.innerHTML = `
                <h3>${title}</h3>
                <a href="${link}" target="_blank">Visit Site →</a>
            `;

            container.appendChild(card);
        });

        if (container.innerHTML === "") {
            loader.style.display = "block";
            loader.innerText = "No projects yet.";
        }

    } catch (err) {
        document.getElementById("loader").innerText = "Error loading projects.";
    }
}

loadProjects();
</script>

</body>
</html>
