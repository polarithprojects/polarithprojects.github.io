<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polarith Web</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        display: flex;
        flex-direction: column;
        align-items: center;
        color: white;
        overflow-x: hidden;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5rem;
        letter-spacing: 2px;
        animation: fadeDown 1s ease;
    }

    .container {
        width: 90%;
        max-width: 1200px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px;
        margin: 50px 0;
    }

    .card {
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        transition: 0.4s;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.2);
        opacity: 0;
        transform: translateY(30px);
        animation: fadeUp 0.8s ease forwards;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.03);
        background: rgba(255, 255, 255, 0.15);
    }

    .card h3 {
        margin-bottom: 10px;
    }

    .card a {
        text-decoration: none;
        color: #00ffd5;
        font-size: 0.9rem;
    }

    .loader {
        margin-top: 50px;
        font-size: 1.2rem;
        opacity: 0.7;
    }

    @keyframes fadeUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeDown {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<h1>Polarith Web</h1>

<div class="loader" id="loader">Loading Projects...</div>

<div class="container" id="projects"></div>

<script>
const username = "polarithprojects";
const repo = "polarithprojects.github.io";

async function loadProjects() {
    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/issues`);
    const data = await res.json();

    const container = document.getElementById("projects");
    const loader = document.getElementById("loader");

    loader.style.display = "none";

    data.forEach((issue, index) => {
        // Skip pull requests
        if (issue.pull_request) return;

        const title = issue.title;
        const link = issue.body.trim();

        const card = document.createElement("div");
        card.className = "card";
        card.style.animationDelay = `${index * 0.1}s`;

        card.innerHTML = `
            <h3>${title}</h3>
            <a href="${link}" target="_blank">Visit Site →</a>
        `;

        container.appendChild(card);
    });

    if (container.innerHTML === "") {
        loader.style.display = "block";
        loader.innerText = "No projects yet. Add via GitHub Issues.";
    }
}

loadProjects();
</script>

</body>
</html>
